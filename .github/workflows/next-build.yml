name: Next.js build

on:
  workflow_dispatch:
  push:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "types/**"
      - "scripts/**"
      - ".eslintrc.json"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "postcss.config.js"
      - "tailwind.config.ts"
      - "next.config.mjs"
      - "next-env.d.ts"
      - ".github/workflows/next-build.yml"
  pull_request:
    paths:
      - "app/**"
      - "components/**"
      - "lib/**"
      - "types/**"
      - "scripts/**"
      - ".eslintrc.json"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "postcss.config.js"
      - "tailwind.config.ts"
      - "next.config.mjs"
      - "next-env.d.ts"
      - ".github/workflows/next-build.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build
